<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhinand K | Full-Stack Web Developer</title>
    <meta name="description" content="Portfolio of Abhinand K, Full-Stack Web Developer & Creative Problem Solver">
    
    <!-- WebGL Dependencies (Three.js & Vanta.js) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: { 950: '#020617', 900: '#0f172a' },
                        emerald: { 400: '#34d399', 500: '#10b981', 600: '#059669' },
                        teal: { 400: '#2dd4bf', 500: '#14b8a6' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }
        .main-container {
            position: relative;
            width: 100%;
            min-height: 100vh;
        }
        .glass {
            background: rgba(2, 6, 23, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .card-glass {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        .gradient-text {
            background: linear-gradient(135deg, #34d399 0%, #14b8a6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Hide scrollbar for clean look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #0f172a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #1e293b; }

        /* WebGL Background Container */
        #vanta-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none; /* Let clicks pass through to UI */
        }
        
        /* Ensure all UI is strictly above the WebGL background */
        .ui-layer {
            position: relative;
            z-index: 10;
        }
    </style>

    <!-- React & ReactDOM (Production) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel Standalone (for JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
</head>
<body class="antialiased selection:bg-emerald-400 selection:text-slate-950">
    <div id="vanta-canvas"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        /* Custom SVGs */
        const MailIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>);
        const PhoneIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>);
        const LinkedinIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>);
        const GithubIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>);
        const MapPinIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>);
        const LinkIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>);
        const CodeIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>);
        const CpuIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>);
        const ServerIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect><line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line></svg>);
        const DatabaseIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></svg>);
        const ArrowRightIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>);

        /* Framer Motion Variants */
        const staggerContainer = {
            hidden: { opacity: 0 },
            show: {
                opacity: 1,
                transition: { staggerChildren: 0.15, delayChildren: 0.2 }
            }
        };

        const slideUpItem = {
            hidden: { opacity: 0, y: 40, filter: "blur(5px)" },
            show: { opacity: 1, y: 0, filter: "blur(0px)", transition: { type: "spring", stiffness: 100, damping: 15 } }
        };

        function App() {
            const [activeSection, setActiveSection] = useState('home');
            const [vantaEffect, setVantaEffect] = useState(null);
            const { scrollYProgress } = window.Motion.useScroll();

            // Initialize WebGL Background
            useEffect(() => {
                if (!vantaEffect && window.VANTA) {
                    setVantaEffect(window.VANTA.NET({
                        el: "#vanta-canvas",
                        mouseControls: true,
                        touchControls: true,
                        gyroControls: false,
                        minHeight: 200.00,
                        minWidth: 200.00,
                        scale: 1.00,
                        scaleMobile: 1.00,
                        color: 0x34d399, // emerald-400
                        backgroundColor: 0x020617, // slate-950 base
                        points: 12.00,
                        maxDistance: 22.00,
                        spacing: 20.00,
                        showDots: true
                    }));
                }
                return () => {
                    if (vantaEffect) vantaEffect.destroy();
                };
            }, [vantaEffect]);

            // Scroll Spy
            useEffect(() => {
                const handleScroll = () => {
                    const sections = ['home', 'skills', 'projects', 'contact'];
                    let current = 'home';
                    for (const section of sections) {
                        const el = document.getElementById(section);
                        if (el) {
                            const rect = el.getBoundingClientRect();
                            if (rect.top <= 100) {
                                current = section;
                            }
                        }
                    }
                    setActiveSection(current);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navLinks = [
                { name: 'Home', id: 'home' },
                { name: 'Skills', id: 'skills' },
                { name: 'Projects', id: 'projects' },
                { name: 'Contact', id: 'contact' },
            ];

            return (
                <div className="main-container ui-layer">

                    {/* Scroll Progress Bar */}
                    <motion.div
                        className="fixed top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-emerald-400 to-teal-400 z-[100] origin-left"
                        style={{ scaleX: scrollYProgress }}
                    />
                    
                    {/* Navbar */}
                    <nav className="fixed top-0 w-full z-50 glass transition-all duration-300 shadow-lg shadow-black/20">
                        <div className="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
                            <motion.div 
                                initial={{ opacity: 0, x: -30 }}
                                animate={{ opacity: 1, x: 0 }}
                                transition={{ type: "spring", stiffness: 100 }}
                                className="text-2xl font-black tracking-tighter cursor-pointer flex items-center gap-2"
                                onClick={() => document.getElementById('home').scrollIntoView({behavior: 'smooth'})}
                            >
                                <span className="text-white">Abhinand</span>
                                <span className="text-emerald-400">.</span>
                            </motion.div>
                            <motion.div 
                                initial={{ opacity: 0, x: 30 }}
                                animate={{ opacity: 1, x: 0 }}
                                transition={{ type: "spring", stiffness: 100 }}
                                className="hidden md:flex space-x-10 items-center"
                            >
                                {navLinks.map((link) => (
                                    <a 
                                        key={link.id} 
                                        href={`#${link.id}`}
                                        className={`text-sm font-semibold tracking-wide transition-colors hover:text-emerald-400 ${activeSection === link.id ? 'text-emerald-400' : 'text-slate-300'}`}
                                    >
                                        {link.name}
                                    </a>
                                ))}
                                <a href="https://github.com/AbhinandK01" target="_blank" rel="noopener noreferrer" className="text-slate-300 hover:text-emerald-400 transition-colors">
                                    <GithubIcon />
                                </a>
                            </motion.div>
                            
                            {/* Mobile menu button */}
                            <motion.div
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1 }}
                                className="md:hidden flex items-center gap-4"
                            >
                                <a href="https://github.com/AbhinandK01" target="_blank" rel="noopener noreferrer" className="text-slate-300 hover:text-emerald-400 transition-colors">
                                    <GithubIcon />
                                </a>
                                <a href="#contact" className="px-4 py-2 bg-emerald-600/20 text-emerald-400 rounded-full text-xs font-bold hover:bg-emerald-600 hover:text-white transition-all">
                                    Contact
                                </a>
                            </motion.div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section id="home" className="min-h-screen flex items-center justify-center pt-20 px-6 relative z-10 w-full overflow-hidden">
                        {/* Overlay to dim WebGL locally for better text readability */}
                        <div className="absolute inset-0 bg-gradient-to-b from-slate-950/40 via-transparent to-slate-950/90 pointer-events-none"></div>

                        <div className="max-w-4xl mx-auto text-center relative z-20">
                            <motion.div variants={staggerContainer} initial="hidden" animate="show">
                                
                                <motion.div variants={slideUpItem} className="mb-6 flex justify-center">
                                    <div className="py-1.5 px-4 rounded-full bg-slate-800/80 border border-slate-700 backdrop-blur-md text-emerald-400 font-semibold tracking-widest uppercase text-[10px] sm:text-xs shadow-lg">
                                        Creative Web Developer
                                    </div>
                                </motion.div>

                                <motion.h1 variants={slideUpItem} className="text-5xl md:text-7xl lg:text-8xl font-black mb-6 text-white tracking-tighter leading-tight drop-shadow-2xl">
                                    Hi, I'm <br className="md:hidden" />
                                    <span className="gradient-text">Abhinand K</span>
                                </motion.h1>
                                
                                <motion.p variants={slideUpItem} className="text-xl md:text-2xl text-slate-200 mb-10 max-w-2xl mx-auto leading-relaxed font-light drop-shadow-md">
                                    Full-Stack Web Developer & <span className="text-white font-medium">Creative Problem Solver</span>. 
                                    I craft immersive, high-performance digital experiences.
                                </motion.p>

                                <motion.div variants={slideUpItem} className="flex flex-col sm:flex-row items-center justify-center gap-5">
                                    <a href="#projects" className="px-8 py-4 w-full sm:w-auto bg-emerald-500 hover:bg-emerald-400 text-slate-950 rounded-full font-bold transition-all shadow-[0_0_20px_rgba(16,185,129,0.5)] hover:shadow-[0_0_30px_rgba(16,185,129,0.7)] hover:-translate-y-1 flex items-center justify-center gap-3 group border border-emerald-400">
                                        Explore My Work
                                        <span className="group-hover:translate-x-1 transition-transform">
                                            <ArrowRightIcon />
                                        </span>
                                    </a>
                                    <a href="https://github.com/AbhinandK01" target="_blank" rel="noopener noreferrer" className="px-8 py-4 w-full sm:w-auto bg-slate-900/80 hover:bg-slate-800 text-white rounded-full font-semibold border border-slate-700 hover:border-emerald-500/50 hover:text-emerald-400 transition-all backdrop-blur-md flex items-center justify-center gap-2 group">
                                        <GithubIcon /> Review Code
                                    </a>
                                </motion.div>

                            </motion.div>
                        </div>
                    </section>

                    {/* Skills Section */}
                    <section id="skills" className="py-24 px-6 relative z-10 bg-slate-950/90 border-t border-slate-800/80 shadow-2xl">
                        <div className="max-w-6xl mx-auto">
                            <motion.div
                                initial={{ opacity: 0, y: 40, filter: "blur(10px)" }}
                                whileInView={{ opacity: 1, y: 0, filter: "blur(0px)" }}
                                viewport={{ once: true, margin: "-100px" }}
                                transition={{ duration: 0.7 }}
                                className="text-center mb-16"
                            >
                                <h2 className="text-4xl md:text-5xl font-black mb-4 tracking-tight text-white drop-shadow-lg">Skills & Expertise</h2>
                                <div className="w-24 h-1.5 bg-gradient-to-r from-emerald-500 to-teal-400 mx-auto rounded-full mb-8 shadow-[0_0_15px_rgba(16,185,129,0.5)]"></div>
                            </motion.div>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                {[
                                    { icon: <CodeIcon />, title: 'Python Programming', description: 'Know the basics of Python programming including fundamental concepts, data structures, and basic scripting. Comfortable with writing simple programs and solving basic problems.', color: 'text-emerald-400', bg: 'bg-emerald-400/10', border: 'hover:border-emerald-500/50' },
                                    { icon: <ServerIcon />, title: 'C Programming', description: 'Familiar with some C programming fundamentals including syntax, basic data types, and control structures. Understanding of foundational programming concepts.', color: 'text-teal-400', bg: 'bg-teal-400/10', border: 'hover:border-teal-500/50' },
                                    { icon: <CpuIcon />, title: 'Problem Solving', description: 'Developing logical thinking and analytical skills through programming exercises. Eager to learn and improve problem-solving abilities.', color: 'text-cyan-400', bg: 'bg-cyan-400/10', border: 'hover:border-cyan-500/50' },
                                    { icon: <DatabaseIcon />, title: 'Learning & Development', description: 'Actively learning new technologies and expanding programming knowledge. Open to exploring different areas of software development.', color: 'text-blue-400', bg: 'bg-blue-400/10', border: 'hover:border-blue-500/50' },
                                ].map((category, idx) => (
                                    <motion.div
                                        key={idx}
                                        initial={{ opacity: 0, y: 40, scale: 0.95, filter: "blur(10px)" }}
                                        whileInView={{ opacity: 1, y: 0, scale: 1, filter: "blur(0px)" }}
                                        viewport={{ once: true }}
                                        transition={{ duration: 0.5, delay: idx * 0.15, type: 'spring', stiffness: 100 }}
                                        className={`card-glass p-8 rounded-3xl hover:-translate-y-3 hover:shadow-[0_15px_50px_rgba(0,0,0,0.5)] transition-all duration-300 border border-slate-800 ${category.border} flex flex-col h-full group bg-slate-900/50`}
                                    >
                                        <div className={`w-16 h-16 rounded-2xl ${category.bg} flex items-center justify-center ${category.color} mb-6 group-hover:scale-110 transition-transform duration-300 shadow-inner`}>
                                            {category.icon}
                                        </div>
                                        <h3 className="text-xl font-bold mb-4 text-white tracking-tight">{category.title}</h3>
                                        <p className="text-sm font-medium text-slate-400 leading-relaxed flex-grow">
                                            {category.description}
                                        </p>
                                    </motion.div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Projects Section */}
                    <section id="projects" className="py-24 px-6 relative z-10 bg-slate-950/95 overflow-hidden">
                        
                        {/* Huge glow in background */}
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-emerald-600/5 rounded-full blur-[120px] pointer-events-none"></div>

                        <div className="max-w-6xl mx-auto relative z-10">
                            <motion.div
                                initial={{ opacity: 0, y: 40, filter: "blur(10px)" }}
                                whileInView={{ opacity: 1, y: 0, filter: "blur(0px)" }}
                                viewport={{ once: true, margin: "-100px" }}
                                transition={{ duration: 0.7 }}
                                className="mb-16 md:flex justify-between items-end"
                            >
                                <div>
                                    <h2 className="text-4xl md:text-5xl font-black mb-4 tracking-tight text-white drop-shadow-lg">Featured Project</h2>
                                    <div className="w-24 h-1.5 bg-gradient-to-r from-emerald-500 to-teal-400 rounded-full shadow-[0_0_15px_rgba(16,185,129,0.5)]"></div>
                                </div>
                                <a href="https://github.com/AbhinandK01" target="_blank" rel="noopener noreferrer" className="hidden md:flex items-center gap-2 text-emerald-400 hover:text-emerald-300 font-semibold transition-colors mt-6 md:mt-0">
                                    View full repository on GitHub <ArrowRightIcon />
                                </a>
                            </motion.div>

                            {/* Solo Prominent Project Card */}
                            <motion.div
                                initial={{ opacity: 0, scale: 0.95, filter: "blur(10px)" }}
                                whileInView={{ opacity: 1, scale: 1, filter: "blur(0px)" }}
                                viewport={{ once: true }}
                                transition={{ duration: 0.8, ease: "easeOut" }}
                                className="card-glass rounded-[2rem] overflow-hidden group border border-slate-700 hover:border-emerald-500/50 hover:shadow-[0_0_50px_rgba(16,185,129,0.15)] transition-all flex flex-col md:flex-row bg-slate-900/50"
                            >
                                <div className="w-full md:w-5/12 h-72 md:h-auto bg-slate-950 relative overflow-hidden flex items-center justify-center p-6 border-b md:border-b-0 md:border-r border-slate-700/50">
                                    <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-emerald-900/30 via-slate-900/80 to-slate-950 z-10"></div>
                                    <div className="z-0 border border-slate-700 rounded-2xl p-8 w-full h-full bg-slate-900 shadow-2xl flex items-center justify-center relative overflow-hidden group-hover:scale-105 transition-transform duration-700">
                                        <div className="absolute -top-10 -right-10 w-40 h-40 bg-emerald-600/20 rounded-full blur-[30px]"></div>
                                        <div className="absolute -bottom-10 -left-10 w-40 h-40 bg-teal-600/20 rounded-full blur-[30px]"></div>
                                        <svg className="w-24 h-24 text-emerald-500/80 z-10 drop-shadow-[0_0_15px_rgba(16,185,129,0.5)]" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                                    </div>
                                </div>
                                <div className="w-full md:w-7/12 p-10 md:p-14 flex flex-col justify-center">
                                    <h3 className="text-3xl md:text-4xl font-black mb-4 text-white group-hover:text-emerald-400 transition-colors tracking-tight">Campus Tech Exchange</h3>
                                    <p className="text-slate-400 text-lg leading-relaxed mb-8 flex-grow font-light">
                                        A highly optimized student-focused marketplace web application meticulously designed for renting and selling items within the campus community. Built from the ground up to facilitate safe, seamless, and secure peer-to-peer commerce among students backed by resilient real-time database management.
                                    </p>
